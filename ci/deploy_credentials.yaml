platform: linux
image_resource:
  type: registry-image
  source:
    repository: gcr.io/google.com/cloudsdktool/cloud-sdk
    tag: alpine
params:
  PROJECT_ID:
  NOTIFY_API_KEY_FILE:
inputs:
  - name: eq-submission-confirmation-consumer
run:
  path: bash
  args:
    - -exc
    - |
      gcloud config set project "${PROJECT_ID}"

      cd eq-submission-confirmation-consumer
      ./ci/deploy_credentials.sh
