platform: linux
image_resource:
  type: registry-image
  source:
    repository: gcr.io/google.com/cloudsdktool/cloud-sdk
    tag: alpine
params:
  PROJECT_ID:

run:
  path: bash
  args:
    - -exc
    - |
      gcloud config set project "${PROJECT_ID}"

      gcloud secrets delete notify_api_key -q
